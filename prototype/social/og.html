<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Uoink · OG card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,500;0,800;1,500&family=JetBrains+Mono:wght@700&family=Bungee&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px;overflow:hidden;background:#0A0A0A}
  .card{position:relative;width:1200px;height:630px;background:#0A0A0A;color:#FFF4EC;display:flex;flex-direction:column;justify-content:space-between;padding:0;border-top:6px solid #FF3D00;border-bottom:6px solid #FF3D00}
  .top{padding:18px 48px;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.22em;text-transform:uppercase;display:flex;justify-content:space-between;font-weight:700;color:#FFF4EC}
  .top b{color:#FF3D00;font-weight:700}
  .top .star{color:#FFD23F}
  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;gap:24px;padding:32px 56px}
  .wm{display:inline-flex;align-items:flex-end;font-family:'Bungee',sans-serif;font-size:96px;line-height:.86;letter-spacing:-0.025em;color:#C2410C}
  .wm .my{flex-shrink:0;height:.84em;width:.66em;margin-right:.02em;align-self:flex-end;display:block}
  .wm .my svg{display:block;width:100%;height:100%}
  .hed{font-family:'Inter',sans-serif;font-weight:800;font-size:120px;line-height:0.95;letter-spacing:-0.04em;color:#FFF4EC;max-width:18ch}
  .hed em{font-style:italic;color:#FF3D00;font-weight:800}
  .sub{display:flex;align-items:center;gap:18px;margin-top:8px}
  .sub .domain{display:inline-flex;align-items:center;background:#C2410C;color:#FFF4EC;padding:10px 22px;font-family:'JetBrains Mono',monospace;font-size:22px;letter-spacing:.04em;font-weight:700;border-radius:999px}
  .sub .domain .dot{color:#FFD23F;margin:0 2px}
  .sub .tag{font-family:'Inter',sans-serif;font-style:italic;font-weight:500;font-size:22px;color:#CFC8B9}
  .stamp{position:absolute;right:56px;bottom:72px;width:140px;height:140px;border:4px solid #FFF4EC;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;transform:rotate(-12deg);font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:#FF3D00;line-height:1.1;font-weight:700;background:transparent}
  .stamp b{display:block;font-size:24px;letter-spacing:.02em;margin:3px 0;color:#FF3D00;font-weight:700}
  .bot{padding:18px 48px;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.22em;text-transform:uppercase;display:flex;justify-content:space-between;font-weight:700;color:#7A7569;border-top:1px solid rgba(255,244,236,0.14)}
  .bot b{color:#FF3D00;font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <div class="top"><span><span class="star">★</span> <b>UOINK</b> v2.1 · the YouTube layer for any AI</span><span>uoink.video</span></div>
    <div class="stage">
      <div class="wm">
        <span class="my">
          <svg viewBox="0 0 100 100"><path d="M 0 0 L 32 0 L 32 60 L 68 60 L 68 0 L 100 0 L 100 80 Q 100 100 80 100 L 20 100 Q 0 100 0 80 Z" fill="#C2410C"/><rect x="0" y="0" width="32" height="14" fill="#FFD23F"/><rect x="68" y="0" width="32" height="14" fill="#FFD23F"/></svg>
        </span>OINK
      </div>
      <div class="hed">Uoink that <em>shit.</em></div>
      <div class="sub">
        <div class="domain">uoink<span class="dot">.</span>video</div>
        <div class="tag">— Read your YouTube like a doc.</div>
      </div>
    </div>
    <div class="stamp">UOINKED<b>v2.1</b>★</div>
    <div class="bot"><span>WINDOWS · MAC v2.1 · OPEN · MIT</span><span>13 <b>MCP</b> TOOLS</span></div>
  </div>
</body>
</html>
